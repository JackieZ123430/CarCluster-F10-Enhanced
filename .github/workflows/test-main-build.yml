name: Test main build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  platformio-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout tested revision
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build ESP32 F10 firmware
        run: pio run -e esp32dev
