; CarCluster-F10-Enhanced - F10-only optimized PlatformIO configuration
; https://github.com/JackieZ123430/CarCluster-F10-Enhanced

[platformio]
src_dir = CarCluster

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 921600

build_flags =
  -Os
  -fno-exceptions
  -fno-rtti
  -DCORE_DEBUG_LEVEL=0
  -DBETTER_CAN_DEBUG=0

; Keep only the modules required by the BMW F10 build.
build_src_filter =
  +<CarCluster.ino>
  +<src/Clusters/BMW_F/*.cpp>
  +<src/Games/BeamNGGame.cpp>
  +<src/Games/ForzaHorizonGame.cpp>
  +<src/Games/SimhubGame.cpp>
  +<src/Libs/MCP_CAN/mcp_can.cpp>
  +<src/Libs/WiFiManager/WiFiManager.cpp>
  +<src/Other/WebDashboard.cpp>
  +<src/Other/WifiFunctions.cpp>
  +<src/Other/mongoose/*.c>
