name: Test main build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  platformio-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout tested revision
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Apply temporary ino build-filter workaround
        shell: bash
        run: |
          cp CarCluster/CarCluster.ino CarCluster/main.cpp
          python - <<'PY'
          from pathlib import Path
          path = Path('platformio.ini')
          text = path.read_text(encoding='utf-8')
          text = text.replace('+<CarCluster.ino>', '+<main.cpp>')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Build ESP32 F10 firmware
        id: build
        shell: bash
        run: |
          set +e
          pio run -e esp32dev 2>&1 | tee platformio-build.log
          build_exit=${PIPESTATUS[0]}
          echo "exit_code=${build_exit}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload complete build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platformio-build-log
          path: platformio-build.log
          if-no-files-found: error

      - name: Fail when PlatformIO fails
        if: steps.build.outputs.exit_code != '0'
        run: exit 1
